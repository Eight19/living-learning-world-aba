// ─── RESPONSIVE HOOK ─────────────────────────────────────────
function useW(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);
  return w;
}

// ─── VOICE ENGINE ────────────────────────────────────────────
// Auto-selects the smoothest available voice
// Priority: Google US English → Samantha (Apple) → best en-US
let _voice=null;
function _loadVoice(){
  const vs=window.speechSynthesis.getVoices();
  if(!vs.length)return;
  const pref=['Google US English','Samantha','Alex','Karen','Daniel'];
  for(const n of pref){const v=vs.find(x=>x.name===n);if(v){_voice=v;return;}}
  _voice=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'))||vs[0]||null;
}
if('speechSynthesis' in window){window.speechSynthesis.onvoiceschanged=_loadVoice;_loadVoice();}

function speak(text){
  if(!('speechSynthesis' in window))return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(_voice)u.voice=_voice;
  u.rate=0.82; u.pitch=1.0; u.volume=1;
  window.speechSynthesis.speak(u);
}

// ─── IMAGE HELPERS ───────────────────────────────────────────
// PX(id) builds a Pexels CDN URL — free, no API key needed
// Replace id numbers with any Pexels photo ID
const PX=id=>`https://images.pexels.com/photos/${id}/pexels-photo-${id}.jpeg?auto=compress&cs=tinysrgb&w=400&h=400&fit=crop`;

// ─── SHAPE RENDERER (SVG, no external images) ────────────────
function ShapeViz({type,size,color}){
  const s=size||120;const c=color||C.blue;
  const shapes={
    circle:<circle cx="50" cy="50" r="44" fill={c}/>,
    square:<rect x="6" y="6" width="88" height="88" rx="4" fill={c}/>,
    triangle:<polygon points="50,5 95,92 5,92" fill={c}/>,
    rectangle:<rect x="4" y="22" width="92" height="56" rx="4" fill={c}/>,
    oval:<ellipse cx="50" cy="50" rx="44" ry="28" fill={c}/>,
    diamond:<polygon points="50,4 96,50 50,96 4,50" fill={c}/>,
    star:<polygon points="50,5 61,35 93,35 68,57 79,91 50,70 21,91 32,57 7,35 39,35" fill={c}/>,
    heart:<path d="M50 85 C12 62 4 44 4 33 C4 17 16 7 28 7 C38 7 46 13 50 20 C54 13 62 7 72 7 C84 7 96 17 96 33 C96 44 88 62 50 85Z" fill={c}/>,
    pentagon:<polygon points="50,5 93,36 77,87 23,87 7,36" fill={c}/>,
    hexagon:<polygon points="89,27 89,73 50,96 11,73 11,27 50,4" fill={c}/>,
    octagon:<polygon points="92,67 67,92 33,92 8,67 8,33 33,8 67,8 92,33" fill={c}/>,
    trapezoid:<polygon points="18,82 82,82 68,18 32,18" fill={c}/>,
    crescent:<path d="M60,10 A40,40 0 1,0 60,90 A28,32 0 1,1 60,10Z" fill={c}/>,
    cross:<path d="M36,4 L64,4 L64,36 L96,36 L96,64 L64,64 L64,96 L36,96 L36,64 L4,64 L4,36 L36,36Z" fill={c}/>,
    arrow:<polygon points="5,35 58,35 58,14 96,50 58,86 58,65 5,65" fill={c}/>,
  };
  return(
    <svg width={s} height={s} viewBox="0 0 100 100" style={{display:'block'}}>
      {shapes[type]||shapes.circle}
    </svg>
  );
}

// ─── NUMBER RENDERER (numeral + dot grid) ────────────────────
function NumberViz({n,size}){
  const sz=size||120;
  const showDots=Math.min(n,20);
  const rows=[];
  for(let i=0;i<showDots;i+=10)rows.push(Math.min(10,showDots-i));
  const dotSz=Math.max(8,Math.floor(sz*0.085));
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,padding:6}}>
      <div style={{fontSize:sz*.48,fontWeight:900,color:C.blue,lineHeight:1}}>{n}</div>
      <div style={{display:'flex',flexDirection:'column',gap:3}}>
        {rows.map((rc,ri)=>(
          <div key={ri} style={{display:'flex',gap:3,justifyContent:'center'}}>
            {Array.from({length:rc}).map((_,i)=>(
              <div key={i} style={{width:dotSz,height:dotSz,borderRadius:'50%',background:C.blue}}/>
            ))}
          </div>
        ))}
        {n>20&&<p style={{fontSize:10,color:C.soft,textAlign:'center',fontWeight:600}}>+{n-20} more</p>}
      </div>
    </div>
  );
}

// ─── SYLLABLE RENDERER (color-coded parts) ───────────────────
function SyllableViz({parts}){
  const cols=['#F4845F','#5BB894','#9B8EC4','#5DADE2','#F9C74F'];
  return(
    <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
      {parts.map((p,i)=>(
        <React.Fragment key={i}>
          <div style={{background:`${cols[i%cols.length]}22`,borderRadius:10,padding:'6px 12px',
            fontWeight:900,fontSize:22,color:cols[i%cols.length],
            border:`2px solid ${cols[i%cols.length]}40`}}>{p}</div>
          {i<parts.length-1&&<span style={{color:C.soft,fontWeight:700,fontSize:18}}>·</span>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ─── UNIVERSAL IMAGE CARD ─────────────────────────────────────
// Handles all visual types: photos, colors, shapes, numbers, words, syllables
function ImgCard({item,size,color}){
  const [err,setErr]=useState(false);
  const sz=size||120;
  const col=color||C.blue;

  if(item.numVal!=null) return <NumberViz n={item.numVal} size={sz}/>;
  if(item.colorHex) return(
    <div style={{width:sz,height:sz,borderRadius:18,background:item.colorHex,
      border:'4px solid rgba(0,0,0,.1)',flexShrink:0}}/>
  );
  if(item.shapeType) return(
    <div style={{width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <ShapeViz type={item.shapeType} size={sz} color={col}/>
    </div>
  );
  if(item.syllables) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:8}}>
      {item.img&&!err&&<img src={item.img} alt={item.label} onError={()=>setErr(true)}
        style={{width:sz*.7,height:sz*.7,objectFit:'cover',borderRadius:14}}/>}
      <SyllableViz parts={item.syllables}/>
    </div>
  );
  if(item.isWord) return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
      {item.img&&!err?(
        <img src={item.img} alt={item.label} onError={()=>setErr(true)}
          style={{width:sz*.75,height:sz*.65,objectFit:'cover',borderRadius:14}}/>
      ):(
        <div style={{width:sz*.75,height:sz*.65,borderRadius:14,background:`${col}12`,
          display:'flex',alignItems:'center',justifyContent:'center',border:`2px dashed ${col}30`}}>
          <span style={{fontSize:sz*.22,color:col,opacity:.35}}>📝</span>
        </div>
      )}
      <div style={{background:`${col}14`,borderRadius:10,padding:'5px 16px',
        fontWeight:900,fontSize:Math.max(16,sz*.18),color:col,
        border:`2px solid ${col}22`,letterSpacing:1}}>{item.label}</div>
    </div>
  );
  if(item.img&&!err){
    return(
      <img src={item.img} alt={item.label} onError={()=>setErr(true)}
        style={{width:sz,height:sz,objectFit:'cover',borderRadius:18,display:'block',flexShrink:0}}/>
    );
  }
  return(
    <div style={{width:sz,height:sz,borderRadius:18,background:`${col}16`,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:sz*.38,fontWeight:900,color:col,
      border:`3px solid ${col}22`,flexShrink:0}}>
      {item.label.charAt(0).toUpperCase()}
    </div>
  );
}

function LearnCat({cat,onBack,onNav}){
  const [viewMode,setViewMode]=useState('grid'); // 'grid' | 'flashcard'
  const [idx,setIdx]=useState(0);
  const [shuffled,setShuffled]=useState(false);
  const [items,setItems]=useState(cat.items);
  const [active,setActive]=useState(null);
  const [tapped,setTapped]=useState(null);
  const tb=useW()>=768;

  function shuffle(){setItems(it=>[...it].sort(()=>Math.random()-.5));setShuffled(true);setIdx(0);}
  function unShuffle(){setItems(cat.items);setShuffled(false);setIdx(0);}

  function tapCard(item,i){
    setActive(i);setTapped(i);speak(item.label);
    setTimeout(()=>setTapped(null),500);
    setTimeout(()=>setActive(null),2200);
  }

  function advance(dir){
    const next=(idx+dir+items.length)%items.length;
    setIdx(next);speak(items[next].label);
  }

  useEffect(()=>{
    if(viewMode==='flashcard')speak(items[idx].label);
  },[viewMode,idx]);

  const imgSz=tb?140:110;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <Hdr title={`${cat.emoji} ${cat.label}`} onBack={onBack} color={cat.color}
        right={
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            {/* View mode toggle */}
            <div style={{display:'flex',background:C.bg,borderRadius:12,padding:3,gap:2,border:`1.5px solid ${C.border}`}}>
              {[{id:'grid',icon:'⊞',label:'Grid'},{id:'flashcard',icon:'◧',label:'Cards'}].map(v=>(
                <button key={v.id} onClick={()=>setViewMode(v.id)}
                  style={{background:viewMode===v.id?cat.color:'transparent',color:viewMode===v.id?'white':C.soft,borderRadius:9,padding:tb?'6px 13px':'5px 10px',fontWeight:700,fontSize:tb?14:12,transition:'all .2s'}}>
                  {v.icon}{tb?` ${v.label}`:''}
                </button>
              ))}
            </div>
            <button onClick={()=>onNav('lgame',{cat,items})}
              style={{background:cat.color,color:'white',borderRadius:14,padding:tb?'10px 16px':'8px 12px',fontWeight:700,fontSize:tb?14:12}}>🎯 Game</button>

// ─── LEARN: GAME ─────────────────────────────────────────────
// Two modes: "What is this?" (tacting) vs "Find the ___" (listener responding)
// Works for DTT, errorless training, discrete trials
function LearnGame({cat,items:passedItems,onBack}){
  const allItems=(passedItems||cat.items).filter(it=>!it.colorHex&&!it.numVal&&!it.shapeType);
  const TOTAL=6;
  const [gameMode,setGameMode]=useState('identify'); // identify | match
  const [score,setScore]=useState(0);const [round,setRound]=useState(0);
  const [sel,setSel]=useState(null);const [res,setRes]=useState(null);const [over,setOver]=useState(false);
  const [started,setStarted]=useState(false);
  const tb=useW()>=768;

  const pool=useMemo(()=>{
    const base=allItems.length>=4?allItems:[...allItems,...CATS[3].items];
    return base.slice(0,Math.max(4,base.length));
  },[]);

  const cur=pool[round%pool.length];

  const opts=useMemo(()=>{
    const others=pool.filter(i=>i.id!==cur.id).sort(()=>Math.random()-.5).slice(0,3);
    return [...others,cur].sort(()=>Math.random()-.5);
  },[round,gameMode]);

  useEffect(()=>{
    if(started)speak(gameMode==='identify'?`What is this?`:`Find the ${cur.label}`);
  },[round,started,gameMode]);

  function answer(item){
    if(res)return;setSel(item.id);
    if(item.id===cur.id){
      setRes('ok');setScore(s=>s+1);speak('Great job!');
      setTimeout(()=>{if(round+1>=TOTAL)setOver(true);else{setRound(r=>r+1);setSel(null);setRes(null);}},1100);
    } else {
      setRes('no');speak('Try again!');
      setTimeout(()=>{setSel(null);setRes(null);},900);
    }
  }

  // Pre-game screen — choose mode
  if(!started){
    return(
      <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:22,padding:32,background:C.bg}}>
        <span style={{fontSize:64}}>{cat.emoji}</span>
        <h2 style={{fontSize:tb?28:24,fontWeight:900,color:C.text,textAlign:'center'}}>{cat.label} Game</h2>
        <p style={{fontSize:14,color:C.soft,fontWeight:600}}>Choose a game type:</p>
        <div style={{display:'flex',flexDirection:'column',gap:12,width:'100%',maxWidth:380}}>
          {[
            {id:'identify',label:'👀 What is this?', sub:'See the image — choose the correct word\n(Tacting / expressive labeling)'},
            {id:'match',   label:'🔊 Find the ___',  sub:'Hear the word — tap the matching image\n(Listener responding / receptive ID)'},
          ].map(gm=>(
            <button key={gm.id} onClick={()=>setGameMode(gm.id)}
              style={{background:gameMode===gm.id?`${cat.color}16`:C.card,borderRadius:18,padding:'16px 20px',textAlign:'left',border:`2.5px solid ${gameMode===gm.id?cat.color:C.border}`,cursor:'pointer',transition:'all .2s'}}>
              <p style={{fontWeight:800,fontSize:17,color:gameMode===gm.id?cat.color:C.text}}>{gm.label}</p>
              <p style={{fontSize:12,color:C.soft,marginTop:4,whiteSpace:'pre-line',lineHeight:1.5}}>{gm.sub}</p>
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:12,width:'100%',maxWidth:380}}>
          <button onClick={onBack} style={{flex:'0 0 80px',background:C.card,borderRadius:16,padding:14,fontWeight:700,fontSize:15,border:`2px solid ${C.border}`,color:C.soft}}>← Back</button>
          <button onClick={()=>setStarted(true)} style={{flex:1,background:cat.color,color:'white',borderRadius:16,padding:14,fontWeight:900,fontSize:18}}>Start →</button>
        </div>
      </div>
    );
  }

  if(over){
    const stars=score>=5?3:score>=3?2:1;
    return(
      <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:22,padding:tb?48:28,background:C.bg}}>
        <span style={{fontSize:tb?100:78,animation:'celebrate 1s ease'}}>🎉</span>
        <h2 style={{fontSize:tb?36:28,fontWeight:900,color:C.text}}>Amazing Work!</h2>
        <div style={{background:`${cat.color}16`,borderRadius:24,padding:tb?'28px 52px':'20px 36px',textAlign:'center',border:`2px solid ${cat.color}28`}}>
          <p style={{fontSize:tb?60:48,fontWeight:900,color:cat.color}}>{score}/{TOTAL}</p>
          <p style={{fontSize:tb?17:14,color:C.soft,fontWeight:600,marginTop:4}}>Correct Answers</p>
          <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:14}}>{[1,2,3].map(s=><span key={s} style={{fontSize:tb?36:28,opacity:s<=stars?1:.25}}>⭐</span>)}</div>
        </div>
        <div style={{display:'flex',gap:12,width:'100%',maxWidth:360}}>
          <button onClick={()=>{setRound(0);setScore(0);setOver(false);setSel(null);setRes(null);setStarted(false);}}
            style={{flex:1,background:cat.color,color:'white',borderRadius:18,padding:tb?20:16,fontWeight:800,fontSize:tb?18:16}}>Play Again</button>
          <button onClick={onBack}
            style={{flex:1,background:C.bg,color:C.text,borderRadius:18,padding:tb?20:16,fontWeight:700,fontSize:tb?17:15,border:`2px solid ${C.border}`}}>Done ✓</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <Hdr title={gameMode==='identify'?'👀 What is this?':'🔊 Find the ___'} onBack={onBack} color={cat.color}
        right={<span style={{fontWeight:900,color:cat.color,fontSize:tb?20:17}}>{score}/{TOTAL}</span>}/>
      <div style={{padding:tb?'8px 24px':'8px 16px',background:C.card}}>
        <div style={{background:C.bg,borderRadius:8,height:10,overflow:'hidden'}}>
          <div style={{width:`${(round/TOTAL)*100}%`,height:'100%',background:cat.color,borderRadius:8,transition:'width .4s ease'}}/>
        </div>
      </div>
      <div style={{flex:1,display:'flex',flexDirection:tb?'row':'column',padding:tb?'14px 24px':10,gap:10,overflowY:'auto',alignItems:tb?'flex-start':'stretch'}}>
        {/* Stimulus panel */}
        <div style={{background:`${cat.color}10`,borderRadius:22,padding:tb?22:16,display:'flex',flexDirection:'column',alignItems:'center',gap:14,border:`2px solid ${cat.color}18`,justifyContent:'center',flex:tb?'0 0 250px':1}}>
          {gameMode==='identify'?(
            <>
              <p style={{fontSize:13,fontWeight:700,color:C.soft}}>What is this?</p>
              <ImgCard item={cur} size={tb?180:130} color={cat.color}/>
              {cur.syllables&&<SyllableViz parts={cur.syllables}/>}
            </>
          ):(
            <>
              <p style={{fontSize:13,fontWeight:700,color:C.soft}}>Find the...</p>
              <div style={{background:cat.color,borderRadius:16,padding:'14px 32px'}}>
                <p style={{fontWeight:900,fontSize:tb?32:26,color:'white'}}>{cur.label}</p>
              </div>
            </>
          )}
          <button onClick={()=>speak(gameMode==='identify'?'What is this?':`Find the ${cur.label}`)}
            style={{background:cat.color,color:'white',borderRadius:14,padding:tb?'10px 22px':'8px 16px',fontWeight:700,fontSize:tb?15:13}}>🔊 Hear</button>
        </div>
        {/* 4 choices */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:tb?12:8,flex:1,alignContent:'start'}}>
          {opts.map(opt=>{
            const ok=sel===opt.id&&res==='ok';const no=sel===opt.id&&res==='no';
            return(
              <button key={opt.id} onClick={()=>answer(opt)}
                style={{background:ok?'#E8F7F2':no?'#FEECEC':C.card,borderRadius:18,padding:tb?'16px 10px':'12px 8px',display:'flex',flexDirection:'column',alignItems:'center',gap:tb?10:6,border:`2.5px solid ${ok?C.green:no?'#E57373':C.border}`,transition:'all .18s',transform:sel===opt.id?'scale(.96)':'scale(1)'}}>
                {gameMode==='identify'?(
                  <p style={{fontWeight:800,fontSize:tb?20:15,color:ok?C.green:no?'#E57373':C.text,textAlign:'center'}}>{opt.label}</p>
                ):(
                  <>
                    <ImgCard item={opt} size={tb?110:78} color={cat.color}/>
                    <p style={{fontWeight:700,fontSize:tb?14:12,color:ok?C.green:no?'#E57373':C.text,textAlign:'center'}}>{opt.label}</p>
                  </>
                )}
                {ok&&<span style={{fontSize:22}}>✅</span>}
                {no&&<span style={{fontSize:22}}>❌</span>}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── FIRST / THEN ─────────────────────────────────────────────
function FirstThen({onBack}){
  const [first,setFirst]=useState(null);const [then,setThen]=useState(null);
  const [picking,setPicking]=useState('first');
  const [showTmr,setShowTmr]=useState(false);
  const [tSec,setTSec]=useState(300);const [tLeft,setTLeft]=useState(300);const [running,setRunning]=useState(false);
  const ref=useRef(null);const tb=useW()>=768;
  useEffect(()=>{if(running&&tLeft>0){ref.current=setTimeout(()=>setTLeft(t=>t-1),1000);}else if(tLeft===0&&running){setRunning(false);speak('Time is up!');}return()=>clearTimeout(ref.current);},[running,tLeft]);
  function pick(act){if(picking==='first'){setFirst(act);speak(`First: ${act.label}`);setPicking('then');}else if(picking==='then'){setThen(act);speak(`Then: ${act.label}`);setPicking(null);}}
  function reset(){setFirst(null);setThen(null);setPicking('first');setTLeft(tSec);setRunning(false);}
  function fmt(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
  const pct=tLeft/tSec;const R=tb?46:38;const circ=2*Math.PI*R;const sz=(R+20)*2;
  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <Hdr title="📋 First / Then" onBack={onBack} color={C.coral}
        right={<button onClick={()=>setShowTmr(s=>!s)} style={{background:showTmr?C.yellow:C.yellowL,borderRadius:14,padding:tb?'10px 18px':'7px 13px',fontWeight:700,fontSize:tb?15:13,color:showTmr?'white':C.text}}>⏱️ Timer</button>}/>
      <div style={{flex:1,overflowY:'auto',padding:tb?'18px 24px':14,display:'flex',flexDirection:'column',gap:14}}>
        {/* Board */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:tb?20:12}}>
          {[{key:'first',label:'FIRST',val:first,color:C.coral},{key:'then',label:'THEN',val:then,color:C.green}].map(slot=>(
            <button key={slot.key} onClick={()=>setPicking(slot.key)}
              style={{background:slot.val?`${slot.color}12`:C.card,borderRadius:24,padding:tb?20:16,display:'flex',flexDirection:'column',alignItems:'center',gap:tb?14:10,border:`3px solid ${picking===slot.key?slot.color:slot.val?`${slot.color}40`:C.border}`,minHeight:tb?200:160,justifyContent:'center',cursor:'pointer',boxShadow:picking===slot.key?`0 0 0 5px ${slot.color}20`:'none',transition:'all .2s'}}>
              <div style={{background:slot.color,borderRadius:12,padding:tb?'5px 18px':'3px 14px',color:'white',fontWeight:900,fontSize:tb?15:13,letterSpacing:1}}>{slot.label}</div>
              {slot.val?(<><span style={{fontSize:tb?62:48}}>{slot.val.emoji}</span><span style={{fontWeight:800,fontSize:tb?18:15,color:C.text}}>{slot.val.label}</span></>):(<><span style={{fontSize:tb?42:34,opacity:.2}}>＋</span><span style={{fontSize:tb?14:12,color:C.soft,fontWeight:600}}>{picking===slot.key?'Choose below ↓':'Tap to select'}</span></>)}
            </button>
          ))}
        </div>
        {/* Timer */}
        {showTmr&&(
          <div style={{background:C.yellowL,borderRadius:24,padding:tb?20:16,display:'flex',flexDirection:tb?'row':'column',alignItems:'center',gap:tb?28:14,border:`2px solid ${C.yellow}40`}}>
            <div style={{position:'relative',width:sz,height:sz,flexShrink:0}}>
              <svg width={sz} height={sz} style={{position:'absolute',top:0,left:0}}>
                <circle cx={sz/2} cy={sz/2} r={R} fill="none" stroke={`${C.yellow}28`} strokeWidth="8"/>
                <circle cx={sz/2} cy={sz/2} r={R} fill="none" stroke={C.yellow} strokeWidth="8" strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform={`rotate(-90 ${sz/2} ${sz/2})`} style={{transition:'stroke-dashoffset 1s linear'}}/>
              </svg>
              <div style={{position:'absolute',top:0,left:0,width:sz,height:sz,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:tb?24:20,color:C.text}}>{fmt(tLeft)}</div>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:10,flex:1}}>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setRunning(r=>!r)} style={{background:C.yellow,color:'white',borderRadius:14,padding:tb?'12px 28px':'9px 22px',fontWeight:800,fontSize:tb?17:15,flex:1}}>{running?'⏸ Pause':'▶ Start'}</button>
                <button onClick={()=>{setTLeft(tSec);setRunning(false);}} style={{background:C.card,borderRadius:14,padding:tb?'12px 18px':'9px 14px',fontWeight:700,fontSize:tb?17:14,border:`1.5px solid ${C.border}`}}>↺</button>
              </div>
              <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                {[60,120,180,300,600].map(s=>(
                  <button key={s} onClick={()=>{setTSec(s);setTLeft(s);setRunning(false);}} style={{background:tSec===s?C.yellow:C.card,color:tSec===s?'white':C.soft,borderRadius:10,padding:tb?'7px 14px':'5px 10px',fontWeight:700,fontSize:tb?14:12,border:`1.5px solid ${tSec===s?C.yellow:C.border}`}}>{fmt(s)}</button>
                ))}
              </div>
            </div>
          </div>
        )}
        {picking&&(
          <div style={{background:picking==='first'?`${C.coral}10`:`${C.green}10`,borderRadius:14,padding:tb?'13px 22px':'10px 16px',textAlign:'center',border:`1.5px solid ${picking==='first'?C.coral:C.green}28`}}>
            <p style={{fontWeight:700,fontSize:tb?16:14,color:picking==='first'?C.coral:C.green}}>{picking==='first'?'👆 Choose the FIRST activity':'👆 Now choose the THEN activity'}</p>
          </div>
        )}
        {/* Activities */}
        <div>
          <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:10,letterSpacing:1.4,textTransform:'uppercase'}}>Activities</p>
          <div style={{display:'grid',gridTemplateColumns:tb?'repeat(4,1fr)':'repeat(3,1fr)',gap:tb?12:9}}>
            {ACTS.map(act=>(
              <button key={act.id} onClick={()=>picking&&pick(act)}
                style={{background:`${act.color}12`,borderRadius:18,padding:tb?'16px 8px':'12px 6px',display:'flex',flexDirection:'column',alignItems:'center',gap:6,border:`2px solid ${act.color}26`,cursor:picking?'pointer':'default',opacity:picking?1:.5,transition:'all .15s'}}>
                <span style={{fontSize:tb?32:26}}>{act.emoji}</span>
                <span style={{fontWeight:700,fontSize:tb?13:11,color:C.text,textAlign:'center',lineHeight:1.2}}>{act.label}</span>
              </button>
            ))}
          </div>
        </div>
        {(first||then)&&<button onClick={reset} style={{background:C.card,borderRadius:18,padding:tb?16:14,fontWeight:700,fontSize:tb?16:14,color:C.soft,border:`2px solid ${C.border}`}}>↺ Clear Board</button>}
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

function Room({room,onBack}){

// ─── TIMER ────────────────────────────────────────────────────
function TimerTool({onBack}){
  const tb=useW()>=768;
  const [tSec,setTSec]=useState(300);const [tLeft,setTLeft]=useState(300);const [running,setRunning]=useState(false);
  const [label,setLabel]=useState('Activity Timer');
  const ref=useRef(null);
  useEffect(()=>{if(running&&tLeft>0){ref.current=setTimeout(()=>setTLeft(t=>t-1),1000);}else if(tLeft===0&&running){setRunning(false);speak('Time is up! Great job!');}return()=>clearTimeout(ref.current);},[running,tLeft]);
  function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
  const pct=tLeft/tSec;
  const R=tb?90:70;const circ=2*Math.PI*R;const sz=(R+20)*2;
  const PRESETS=[{label:'1 min',sec:60},{label:'2 min',sec:120},{label:'3 min',sec:180},{label:'5 min',sec:300},{label:'10 min',sec:600},{label:'15 min',sec:900},{label:'20 min',sec:1200},{label:'30 min',sec:1800}];

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column'}}>
      <Hdr title="⏱️ Timer" onBack={onBack} color={C.yellow}/>

        <div style={{position:'relative',width:sz,height:sz}}>
          <svg width={sz} height={sz}>
            <circle cx={sz/2} cy={sz/2} r={R} fill={`${color}10`} stroke={`${color}22`} strokeWidth={tb?18:14}/>
            <circle cx={sz/2} cy={sz/2} r={R} fill="none" stroke={color} strokeWidth={tb?18:14} strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round" transform={`rotate(-90 ${sz/2} ${sz/2})`} style={{transition:'stroke-dashoffset 1s linear,stroke .5s ease'}}/>
          </svg>
          <div style={{position:'absolute',top:0,left:0,width:sz,height:sz,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4}}>
            <span style={{fontSize:tb?56:44,fontWeight:900,color:C.text,fontVariantNumeric:'tabular-nums'}}>{fmt(tLeft)}</span>
            <span style={{fontSize:tb?14:12,color:C.soft,fontWeight:600}}>{label}</span>
          </div>
        </div>
        <div style={{display:'flex',gap:12}}>
          <button onClick={()=>setRunning(r=>!r)} style={{background:running?C.coral:color,color:'white',borderRadius:20,padding:tb?'16px 44px':'14px 34px',fontWeight:900,fontSize:tb?22:18,minWidth:160}}>{running?'⏸ Pause':'▶ Start'}</button>
          <button onClick={()=>{setTLeft(tSec);setRunning(false);}} style={{background:C.card,borderRadius:20,padding:tb?'16px 22px':'14px 18px',fontWeight:700,fontSize:tb?20:18,border:`2px solid ${C.border}`,color:C.soft}}>↺</button>
        </div>
        <div style={{width:'100%',maxWidth:560}}>
          <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:12,letterSpacing:1.4,textTransform:'uppercase',textAlign:'center'}}>Quick Set</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:tb?10:8}}>
            {PRESETS.map(p=>(
              <button key={p.sec} onClick={()=>{setTSec(p.sec);setTLeft(p.sec);setRunning(false);}}
                style={{background:tSec===p.sec?C.yellow:C.card,color:tSec===p.sec?'white':C.text,borderRadius:14,padding:tb?'12px 0':'10px 0',fontWeight:800,fontSize:tb?15:13,border:`2px solid ${tSec===p.sec?C.yellow:C.border}`,transition:'all .15s'}}>{p.label}</button>
            ))}
          </div>
        </div>
        <div style={{width:'100%',maxWidth:420,background:C.card,borderRadius:16,padding:16,border:`1px solid ${C.border}`}}>
          <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:10,letterSpacing:1,textTransform:'uppercase'}}>Progress</p>
          <div style={{background:C.bg,borderRadius:10,height:tb?20:14,overflow:'hidden'}}>
            <div style={{width:`${pct*100}%`,height:'100%',background:color,borderRadius:10,transition:'width 1s linear,background .5s ease'}}/>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
            <span style={{fontSize:12,color:C.soft,fontWeight:600}}>0:00</span>
            <span style={{fontSize:12,color:C.soft,fontWeight:600}}>{fmt(tSec)}</span>
          </div>
        </div>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}><span style={{fontSize:13,fontWeight:700,color:C.soft}}>Speed</span><span style={{fontSize:13,fontWeight:800,color:C.text}}>{speechRate}%</span></div>
                <input type="range" min={60} max={120} step={2} value={speechRate} onChange={e=>setSpeechRate(+e.target.value)} style={{width:'100%',accentColor:C.green}}/>
              </div>
              <div style={{display:'flex',gap:10}}>
                <input value={testWord} onChange={e=>setTestWord(e.target.value)} placeholder="Type a word to test..." style={{flex:1,background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:'10px 14px',fontSize:14,fontWeight:600,color:C.text,outline:'none'}}/>
                <button onClick={testSpeech} style={{background:C.green,color:'white',borderRadius:12,padding:'10px 18px',fontWeight:700,fontSize:14}}>Test</button>
              </div>
            </div>
          )}
        </div>
        <div style={{background:C.card,borderRadius:20,padding:tb?'20px 24px':'16px 18px',border:`1.5px solid ${C.border}`}}>
          <p style={{fontWeight:800,fontSize:tb?17:15,color:C.text,marginBottom:14}}>📱 App Info</p>
          {[
            {label:'App Name',val:'Living Learning World'},
            {label:'Version',val:'2.0.0'},
            {label:'Categories',val:`${CATS.length} learning categories`},
            {label:'Total Items',val:`${CATS.reduce((a,c)=>a+c.items.length,0)}+ vocabulary items`},
            {label:'Platform',val:'Web · Tablet · Mobile'},
            {label:'Data Storage',val:'Session only (local)'},
          ].map(row=>(
            <div key={row.label} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:`1px solid ${C.border}`}}>
              <span style={{fontSize:tb?14:13,color:C.soft,fontWeight:600}}>{row.label}</span>
              <span style={{fontSize:tb?14:13,color:C.text,fontWeight:700}}>{row.val}</span>
            </div>
          ))}
        </div>
        <div style={{height:8}}/>
      </div>
    </div>
  );
}

// ─── UPLOAD (CUSTOM CONTENT LIBRARY) ─────────────────────────
function Upload({role,onBack}){
  const [tab,setTab]=useState('photos');
  const tb=useW()>=768;
  const fileRef=useRef(null);
  const [items,setItems]=useState([]);
  const [editing,setEditing]=useState(null);
  const [editLabel,setEditLabel]=useState('');
  const [editCat,setEditCat]=useState('');
  const CATTAGS=['Room','Item','Person','Activity','Food','Routine','Place','Other'];
  const tabs=[{id:'photos',label:'Photos',emoji:'📷'},{id:'people',label:'People',emoji:'👤'},{id:'routines',label:'Routines',emoji:'📋'}];
  const tabCatMap={photos:['Room','Item','Food','Place','Other'],people:['Person'],routines:['Activity','Routine']};
  const visible=items.filter(it=>tabCatMap[tab]?.includes(it.cat));

  function openPicker(){fileRef.current&&fileRef.current.click();}
  function onFileChange(e){
    const files=Array.from(e.target.files);
    if(!files.length)return;
    files.forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        const defaultCat=tab==='people'?'Person':tab==='routines'?'Activity':'Item';
        const ni={id:Date.now()+Math.random(),label:file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' '),imgSrc:ev.target.result,cat:defaultCat,date:'Just now'};
        setItems(p=>[ni,...p]);
        setEditing(ni);setEditLabel(ni.label);setEditCat(ni.cat);
      };
      reader.readAsDataURL(file);
    });
    e.target.value='';
  }
  function saveEdit(){setItems(p=>p.map(x=>x.id===editing.id?{...x,label:editLabel,cat:editCat}:x));setEditing(null);}
  function deleteItem(){setItems(p=>p.filter(x=>x.id!==editing.id));setEditing(null);}

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',position:'relative'}}>
      <Hdr title="📷 My Content" onBack={onBack} color={role.color}/>
      <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={onFileChange}/>
      <div style={{display:'flex',background:C.card,borderBottom:`1px solid ${C.border}`,padding:tb?'10px 24px':'8px 14px',gap:8}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:tb?'10px 0':'8px 0',borderRadius:14,fontWeight:700,fontSize:tb?15:13,background:tab===t.id?role.color:'transparent',color:tab===t.id?'white':C.soft,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>{tb&&t.emoji} {t.label}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:tb?'20px 24px':14,display:'flex',flexDirection:tb?'row':'column',gap:tb?22:14,alignItems:'flex-start'}}>
        {/* Upload panel */}
        <div style={{display:'flex',flexDirection:'column',gap:14,flexShrink:0,width:tb?300:'100%'}}>
          <button onClick={openPicker} style={{background:role.light,borderRadius:24,padding:tb?28:20,border:`2.5px dashed ${role.color}55`,display:'flex',flexDirection:'column',alignItems:'center',gap:12,cursor:'pointer',width:'100%'}}>
            <span style={{fontSize:tb?50:38}}>📤</span>
            <span style={{fontWeight:900,fontSize:tb?18:15,color:role.color}}>Add {tab==='photos'?'Photo':tab==='people'?'Person':'Routine'}</span>
            <p style={{fontSize:tb?13:12,color:C.soft,textAlign:'center',lineHeight:1.6}}>Tap to open your camera roll. You can select multiple photos at once.</p>
            <div style={{background:role.color,color:'white',borderRadius:16,padding:tb?'11px 26px':'9px 20px',fontWeight:800,fontSize:tb?15:13}}>📷 Choose Photo</div>
          </button>
          <div style={{background:C.yellowL,borderRadius:18,padding:'14px 16px',border:`1.5px solid ${C.yellow}38`,display:'flex',gap:10,alignItems:'flex-start'}}>
            <span style={{fontSize:16,flexShrink:0}}>💡</span>
            <p style={{fontSize:12,color:C.soft,lineHeight:1.5}}>After uploading, tap ✏️ to name it and tag it so it appears in the right tab.</p>
          </div>
        </div>
        {/* Library */}
        <div style={{flex:1,width:'100%'}}>
          <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:12,letterSpacing:1.4,textTransform:'uppercase'}}>{tab} Library · {visible.length} items</p>
          {visible.length===0?(
            <div style={{background:C.card,borderRadius:18,padding:'32px 20px',textAlign:'center',border:`2px dashed ${C.border}`}}>
              <p style={{fontSize:32,marginBottom:10}}>📭</p>
              <p style={{fontWeight:700,fontSize:14,color:C.soft}}>No {tab} yet</p>
              <p style={{fontSize:12,color:C.soft,marginTop:4}}>Tap "Choose Photo" to add your first one</p>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {visible.map(it=>(
                <div key={it.id} style={{background:C.card,borderRadius:18,padding:tb?'12px 16px':'10px 14px',display:'flex',alignItems:'center',gap:12,border:`1px solid ${C.border}`,animation:'fadeIn .3s ease'}}>
                  <div style={{width:tb?58:50,height:tb?58:50,borderRadius:14,background:`${role.color}12`,overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {it.imgSrc?<img src={it.imgSrc} alt={it.label} style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:26}}>📸</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontWeight:700,fontSize:tb?16:14,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.label}</p>
                    <div style={{display:'flex',gap:6,marginTop:3}}>
                      <span style={{background:`${role.color}16`,color:role.color,borderRadius:8,padding:'2px 8px',fontSize:11,fontWeight:700}}>{it.cat}</span>
                      <span style={{fontSize:11,color:C.soft}}>{it.date}</span>
                    </div>
                  </div>
                  <button onClick={()=>{setEditing(it);setEditLabel(it.label);setEditCat(it.cat);}} style={{background:C.bg,borderRadius:12,width:tb?40:36,height:tb?40:36,display:'flex',alignItems:'center',justifyContent:'center',fontSize:tb?18:16,flexShrink:0}}>✏️</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
      {/* Edit modal */}
      {editing&&(
        <div style={{position:'absolute',inset:0,background:'rgba(44,24,16,.45)',display:'flex',alignItems:'flex-end',zIndex:100}} onClick={e=>{if(e.target===e.currentTarget)setEditing(null);}}>
          <div style={{background:C.card,borderRadius:'24px 24px 0 0',padding:tb?'28px 32px':'22px 20px',width:'100%',display:'flex',flexDirection:'column',gap:16,animation:'slideUp .3s ease'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <p style={{fontWeight:900,fontSize:tb?20:18,color:C.text}}>Edit Item</p>
              <button onClick={()=>setEditing(null)} style={{fontSize:22,color:C.soft,padding:'4px 8px'}}>✕</button>
            </div>
            {editing.imgSrc&&(
              <div style={{display:'flex',justifyContent:'center'}}>
                <img src={editing.imgSrc} alt="" style={{width:tb?120:90,height:tb?120:90,borderRadius:18,objectFit:'cover',border:`2px solid ${C.border}`}}/>
              </div>
            )}
            <div>
              <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:7,letterSpacing:1,textTransform:'uppercase'}}>Label / Name</p>
              <input value={editLabel} onChange={e=>setEditLabel(e.target.value)} placeholder="e.g. Living Room, Mom, Morning Routine" style={{width:'100%',background:C.bg,border:`2px solid ${role.color}48`,borderRadius:14,padding:'12px 16px',fontSize:tb?16:15,fontWeight:700,color:C.text,outline:'none'}}/>
            </div>
            <div>
              <p style={{fontSize:11,fontWeight:800,color:C.soft,marginBottom:9,letterSpacing:1,textTransform:'uppercase'}}>Category Tag</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
                {CATTAGS.map(ct=>(
                  <button key={ct} onClick={()=>setEditCat(ct)} style={{background:editCat===ct?role.color:C.bg,color:editCat===ct?'white':C.soft,borderRadius:12,padding:'9px 4px',fontWeight:700,fontSize:tb?13:12,border:`2px solid ${editCat===ct?role.color:C.border}`,transition:'all .15s'}}>{ct}</button>
                ))}
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginTop:4}}>
              <button onClick={deleteItem} style={{background:'#FEECEC',color:'#E57373',borderRadius:14,padding:'13px 0',fontWeight:700,fontSize:tb?15:14,flex:'0 0 80px',border:'1.5px solid #E5737328'}}>🗑️ Delete</button>
              <button onClick={saveEdit} style={{flex:1,background:role.color,color:'white',borderRadius:14,padding:'13px 0',fontWeight:900,fontSize:tb?17:15}}>Save Changes ✓</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [role,setRole]=useState(null);
  const [view,setView]=useState('splash');
  const [vdata,setVdata]=useState(null);
  const [hist,setHist]=useState([]);

  function nav(v,d=null){setHist(h=>[...h,{view,data:vdata}]);setView(v);setVdata(d);}
  function back(){if(!hist.length)return;const p=hist[hist.length-1];setHist(h=>h.slice(0,-1));setView(p.view);setVdata(p.data);}
  function selectRole(r){setRole(r);setView('dash');}
  function changeRole(r){setRole(r);}

  return(
    <div style={{height:'100vh',overflow:'hidden',background:C.bg}}>
      {view==='splash'    &&<Splash onSelect={selectRole}/>}
      {view==='dash'      &&<Dashboard role={role} onNav={nav}/>}
      {view==='learn'     &&<LearnMode onBack={back} onNav={nav}/>}
      {view==='lcat'      &&<LearnCat cat={vdata} onBack={back} onNav={nav}/>}
      {view==='lgame'     &&<LearnGame cat={vdata?.cat||vdata} items={vdata?.items} onBack={back}/>}
      {view==='firstthen' &&<FirstThen onBack={back}/>}
      {view==='miniworld' &&<MiniWorld onBack={back} onNav={nav}/>}
      {view==='room'      &&<Room room={vdata} onBack={back}/>}
      {view==='upload'    &&<Upload role={role} onBack={back}/>}
      {view==='datanotes' &&<DataNotes role={role} onBack={back}/>}
      {view==='timer'     &&<TimerTool onBack={back}/>}
      {view==='goals'     &&<Goals role={role} onBack={back}/>}
      {view==='settings'  &&<Settings role={role} onBack={back} onRoleChange={changeRole}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
